name: ulinq_sdk
description: Production-ready Flutter SDK for Ulinq deep link resolution and install attribution.
version: 1.0.0
homepage: https://ulinq.cc
repository: https://github.com/ulinq/ulinq
issue_tracker: https://github.com/ulinq/ulinq/issues

environment:
  sdk: ">=2.19.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  app_links: ^6.3.3
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: cc.ulinq.sdk
        pluginClass: UlinqSdkPlugin
      ios:
        pluginClass: UlinqSdkPlugin
